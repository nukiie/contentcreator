<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tidlor Content Radar v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1f2a;
    --border: #252b38;
    --accent: #00e5a0;
    --accent2: #ff6b35;
    --accent3: #7c6aff;
    --text: #e8eaf0;
    --text-dim: #6b7591;
    --text-mid: #a0a8bf;
    --font: 'Sarabun', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 0 20px; }

  /* ── Header ── */
  header {
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
  }
  .header-inner { display: flex; align-items: center; gap: 16px; }
  .logo-mark {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 10px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 22px; height: 22px; }
  .logo-text h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-text p { font-size: 12px; color: var(--text-dim); font-family: var(--mono); margin-top: 2px; }
  .status-dot {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-dim); font-family: var(--mono);
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Config Banner ── */
  .config-banner {
    margin: 20px 0;
    padding: 14px 18px;
    background: rgba(255,107,53,0.08);
    border: 1px solid rgba(255,107,53,0.25);
    border-radius: 10px;
    font-size: 13px; color: #ffb89a;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .config-banner span { opacity: 0.7; font-size: 16px; }

  /* ── Search Panel ── */
  .search-panel {
    margin: 24px 0;
    padding: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
  }
  .panel-label {
    font-size: 11px; font-family: var(--mono);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 16px;
    color: var(--accent);
  }
  .input-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .keyword-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 15px; color: var(--text);
    font-family: var(--font);
    outline: none;
    transition: border-color 0.2s;
  }
  .keyword-input:focus { border-color: var(--accent); }
  .keyword-input::placeholder { color: var(--text-dim); }

  .btn-run {
    padding: 12px 24px;
    background: var(--accent);
    color: #0a0c10;
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-run:hover { background: #00ffb3; transform: translateY(-1px); }
  .btn-run:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }

  .quick-keywords { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .qk-btn {
    padding: 5px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; font-size: 12px; color: var(--text-mid);
    cursor: pointer; font-family: var(--font); transition: all 0.15s;
  }
  .qk-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Apps Script Config ── */
  .config-row {
    display: flex; gap: 8px; margin-top: 16px;
    padding-top: 16px; border-top: 1px solid var(--border);
  }
  .config-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 12px; color: var(--text-dim);
    font-family: var(--mono);
    outline: none; transition: border-color 0.2s;
  }
  .config-input:focus { border-color: var(--accent3); color: var(--text); }
  .btn-save-cfg {
    padding: 9px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; font-size: 12px; color: var(--text-mid);
    cursor: pointer; font-family: var(--font); transition: all 0.15s;
  }
  .btn-save-cfg:hover { border-color: var(--accent3); color: var(--accent3); }

  /* ── Loading ── */
  .loading {
    display: none;
    text-align: center; padding: 60px 20px;
  }
  .loading.show { display: block; }
  .radar-anim {
    width: 64px; height: 64px; margin: 0 auto 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-dim); font-family: var(--mono); }
  .loading-step { margin-top: 8px; font-size: 12px; color: var(--accent); font-family: var(--mono); }

  /* ── Results ── */
  #results { display: none; }
  #results.show { display: block; }

  /* ── Meta Info Section ── */
  .meta-row {
    display: flex; gap: 12px; flex-wrap: wrap;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 20px;
  }
  .meta-item { font-size: 12px; font-family: var(--mono); color: var(--text-dim); }
  .meta-item span { color: var(--accent); }

  /* ── Results Grid ── */
  .results-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .card.green::before { background: var(--accent); }
  .card.orange::before { background: var(--accent2); }
  .card.purple::before { background: var(--accent3); }

  .card-title {
    font-size: 11px; font-family: var(--mono);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .card.green .card-title { color: var(--accent); }
  .card.orange .card-title { color: var(--accent2); }
  .card.purple .card-title { color: var(--accent3); }

  /* ── TikTok Script Section ── */
  .gen-selector {
    display: flex; gap: 8px; margin-bottom: 16px;
    padding: 12px;
    background: var(--surface2);
    border-radius: 8px;
    align-items: center;
  }
  .gen-selector label { font-size: 12px; color: var(--text-dim); margin-right: 8px; font-family: var(--mono); text-transform: uppercase; }
  .gen-selector select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--accent);
    font-size: 13px; font-family: var(--font);
    cursor: pointer;
  }
  .gen-selector select:focus { outline: none; border-color: var(--accent); }

  /* ── Clip Container ── */
  .clips-container { display: grid; grid-template-columns: 1fr; gap: 18px; }
  .clip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    border-left: 3px solid var(--accent2);
  }
  .clip.gen-y { border-left-color: var(--accent3); }

  .clip-header {
    font-size: 12px; font-family: var(--mono);
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--accent2); margin-bottom: 12px; font-weight: 600;
  }
  .clip.gen-y .clip-header { color: var(--accent3); }

  .clip-part { margin-bottom: 14px; }
  .clip-part:last-child { margin-bottom: 0; }
  .clip-label {
    font-size: 11px; font-family: var(--mono);
    color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  .clip-content {
    background: var(--bg);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 13px; color: var(--text-mid); line-height: 1.5;
    border-left: 2px solid var(--accent2);
  }
  .clip.gen-y .clip-content { border-left-color: var(--accent3); }

  /* Keyword tags */
  .keyword-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .tag {
    display: inline-block;
    padding: 4px 8px;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.3);
    border-radius: 4px;
    font-size: 11px; color: #7ff5d4; font-family: var(--mono);
  }
  .tag.gen-y { background: rgba(124,106,255,0.1); border-color: rgba(124,106,255,0.3); color: #b8b0ff; }

  .hashtags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .hashtag { font-size: 12px; color: var(--accent3); font-family: var(--mono); }

  /* ── Keyword Cloud ── */
  .kw-cloud { display: flex; flex-wrap: wrap; gap: 7px; }
  .kw-tag {
    padding: 6px 12px;
    border-radius: 6px; font-size: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-mid); cursor: default;
  }

  /* ── PAA List ── */
  .paa-list { list-style: none; }
  .paa-list li {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px; color: var(--text-mid);
    display: flex; gap: 8px; align-items: flex-start;
  }
  .paa-list li:last-child { border-bottom: none; }
  .paa-list li::before { content: "?"; color: var(--accent3); font-family: var(--mono); font-size: 11px; margin-top: 2px; }

  /* ── SEO FAQ ── */
  .faq-list { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .faq-item {
    background: var(--surface2); border-radius: 10px;
    padding: 14px; border: 1px solid var(--border);
  }
  .faq-q { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .faq-q::before { content: "Q: "; color: var(--accent); font-family: var(--mono); font-size: 11px; }
  .faq-a { font-size: 13px; line-height: 1.6; color: var(--text-mid); }
  .faq-a::before { content: "A: "; color: var(--text-dim); font-family: var(--mono); font-size: 11px; }

  /* ── Top SERP ── */
  .serp-item {
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .serp-item:last-child { border-bottom: none; }
  .serp-title { font-size: 13px; color: var(--accent3); margin-bottom: 3px; }
  .serp-snippet { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
  .serp-url { font-size: 10px; font-family: var(--mono); color: var(--border); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Pain Points ── */
  .pain-list { list-style: none; }
  .pain-list li {
    padding: 7px 0; border-bottom: 1px solid var(--border);
    font-size: 13px; color: var(--text-mid);
    display: flex; gap: 8px;
  }
  .pain-list li:last-child { border-bottom: none; }
  .pain-list li::before { content: "!"; color: var(--accent2); font-family: var(--mono); font-size: 11px; }

  /* Action buttons */
  .action-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .btn-action {
    padding: 10px 20px;
    border-radius: 8px; border: 1px solid var(--border);
    font-size: 13px; font-family: var(--font);
    cursor: pointer; transition: all 0.15s;
    background: var(--surface2); color: var(--text-mid);
  }
  .btn-action:hover { border-color: var(--accent); color: var(--accent); }
  .btn-action.primary {
    background: var(--accent); color: #0a0c10;
    border-color: var(--accent); font-weight: 700;
  }
  .btn-action.primary:hover { background: #00ffb3; }

  /* Error */
  .error-box {
    display: none;
    padding: 16px 20px;
    background: rgba(255,59,48,0.08);
    border: 1px solid rgba(255,59,48,0.25);
    border-radius: 10px; margin: 16px 0;
    font-size: 13px; color: #ff8080; font-family: var(--mono);
  }
  .error-box.show { display: block; }

  /* Empty state */
  .empty {
    text-align: center; padding: 80px 20px;
    color: var(--text-dim);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 640px) {
    .gen-selector { flex-direction: column; align-items: flex-start; }
    .gen-selector select { width: 100%; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="logo-mark">
        <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="3" fill="#0a0c10"/>
          <circle cx="11" cy="11" r="6" stroke="#0a0c10" stroke-width="1.5" stroke-dasharray="3 2"/>
          <circle cx="11" cy="11" r="9.5" stroke="#0a0c10" stroke-width="1.5" stroke-dasharray="2 3"/>
          <line x1="11" y1="11" x2="17" y2="5" stroke="#0a0c10" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <h1>Tidlor Content Radar v2</h1>
        <p>research · script generation · aeo optimizer</p>
      </div>
      <div class="status-dot">
        <div class="dot"></div>
        <span id="status-label">ready</span>
      </div>
    </div>
  </header>

  <!-- Config banner -->
  <div class="config-banner" id="config-banner">
    <span>⚙️</span>
    <div>
      กรุณาใส่ URL ของ Google Apps Script Web App ก่อนใช้งาน
    </div>
  </div>

  <!-- Search Panel -->
  <div class="search-panel">
    <div class="panel-label">⚡ Research + Generate</div>

    <div class="input-row">
      <input
        class="keyword-input"
        id="keyword-input"
        type="text"
        placeholder="พิมพ์ keyword เช่น สินเชื่อทะเบียนรถ..."
        value="สินเชื่อทะเบียนรถ"
      />
      <button class="btn-run" id="btn-run" onclick="runFull()">▶ Run</button>
    </div>

    <div class="quick-keywords">
      <span class="row-label" style="line-height:26px;">Quick:</span>
      <button class="qk-btn" onclick="setKeyword('สินเชื่อทะเบียนรถ')">สินเชื่อทะเบียนรถ</button>
      <button class="qk-btn" onclick="setKeyword('สินเชื่อโฉนดที่ดิน')">สินเชื่อโฉนดที่ดิน</button>
      <button class="qk-btn" onclick="setKeyword('กู้เงิน')">กู้เงิน</button>
      <button class="qk-btn" onclick="setKeyword('สินเชื่อที่ดิน')">สินเชื่อที่ดิน</button>
      <button class="qk-btn" onclick="setKeyword('เงินกู้ฉุกเฉิน')">เงินกู้ฉุกเฉิน</button>
    </div>

    <!-- Apps Script URL config -->
    <div class="config-row">
      <input
        class="config-input"
        id="apps-script-url"
        type="text"
        placeholder="https://script.google.com/macros/s/AKfycbzgFn_E84edfJsua9onnGj-39gIcEgvf7AZd9j-99h_9LhQX4p76_wtCSSsUc29_r9O/exec"
      />
      <button class="btn-save-cfg" onclick="saveConfig()">💾 Save</button>
    </div>
  </div>

  <!-- Error -->
  <div class="error-box" id="error-box"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="radar-anim"></div>
    <div class="loading-text">กำลังวิเคราะห์...</div>
    <div class="loading-step" id="loading-step">กำลังดึงข้อมูลจาก Google Search</div>
  </div>

  <!-- Results -->
  <div id="results">
    <!-- Meta row -->
    <div class="meta-row" id="meta-row"></div>

    <!-- Grid -->
    <div class="results-grid" id="results-grid"></div>

    <!-- Actions -->
    <div class="action-row">
      <button class="btn-action primary" onclick="saveToSheet()">📊 Save to Google Sheet</button>
      <button class="btn-action" onclick="copyAllScripts()">📋 Copy All Scripts</button>
      <button class="btn-action" onclick="copyFAQ()">🤖 Copy SEO FAQ</button>
      <button class="btn-action" onclick="resetResults()">🔄 ค้นหาใหม่</button>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty" id="empty-state">
    <div class="empty-icon">📡</div>
    <p>พิมพ์ keyword และกด Run<br>เพื่อดึงข้อมูลและสร้าง content</p>
  </div>

</div>

<script>
let currentData = null;
let appsScriptUrl = localStorage.getItem("apps_script_url") || "https://script.google.com/macros/s/AKfycbzcb_SyBIaA2FH0450jaIIhAg_8HZgSnvRjbQU2bttgjgW1htxtKS5Psa3GNgrRMrDK/exec";

// Init
window.onload = () => {
  document.getElementById("apps-script-url").value = appsScriptUrl;
  if (appsScriptUrl) {
    document.getElementById("config-banner").style.display = "none";
  }
};

function setKeyword(kw) {
  document.getElementById("keyword-input").value = kw;
}

function saveConfig() {
  const url = document.getElementById("apps-script-url").value.trim();
  if (!url) return;
  appsScriptUrl = url;
  localStorage.setItem("apps_script_url", url);
  document.getElementById("config-banner").style.display = "none";
  document.getElementById("status-label").textContent = "configured ✓";
}

// ─── JSONP helper ────────────────────────────────────────────
function jsonp(baseUrl, params, onSuccess, onError) {
  const cbName = "cb_" + Date.now();
  const timeout = setTimeout(() => {
    cleanup();
    onError("timeout — Apps Script ใช้เวลานานเกินไป (>90s)");
  }, 90000);

  function cleanup() {
    delete window[cbName];
    const s = document.getElementById("jsonp_script");
    if (s) s.remove();
    clearTimeout(timeout);
  }

  window[cbName] = function(data) {
    cleanup();
    onSuccess(data);
  };

  const qs = Object.entries(params)
    .map(([k,v]) => encodeURIComponent(k) + "=" + encodeURIComponent(v))
    .join("&");

  const script = document.createElement("script");
  script.id = "jsonp_script";
  script.src = baseUrl + "?" + qs + "&callback=" + cbName;
  script.onerror = function() { cleanup(); onError("script load error"); };
  document.body.appendChild(script);
}

function runFull() {
  const keyword = document.getElementById("keyword-input").value.trim();
  if (!keyword) return;

  if (!appsScriptUrl) {
    showError("กรุณาใส่ Apps Script URL ก่อน");
    return;
  }

  setLoading(true);
  hideError();
  resetResults();

  const steps = [
    "กำลังดึงข้อมูลจาก Google Search...",
    "วิเคราะห์ People Also Ask...",
    "ดึง Autocomplete Suggestions...",
    "สร้าง TikTok Script (Gen Z x3, Gen Y x3)...",
    "สร้าง SEO FAQ...",
  ];
  let si = 0;
  const stepInterval = setInterval(() => {
    if (si < steps.length) {
      document.getElementById("loading-step").textContent = steps[si++];
    }
  }, 1200);

  jsonp(
    appsScriptUrl,
    { action: "full", keyword: keyword },
    function(json) {
      clearInterval(stepInterval);
      setLoading(false);
      if (!json.success) { showError("Error: " + (json.error || "Unknown")); return; }
      currentData = Object.assign({ keyword: keyword }, json.data);
      renderResults(currentData);
    },
    function(err) {
      clearInterval(stepInterval);
      setLoading(false);
      showError("เรียก Apps Script ไม่ได้: " + err);
    }
  );
}

function renderResults(data) {
  const { research, content, keyword } = data;

  // Meta row
  document.getElementById("meta-row").innerHTML = `
    <div class="meta-item">keyword: <span>${keyword}</span></div>
    <div class="meta-item">intent: <span>${content.search_intent || '—'}</span></div>
    <div class="meta-item">angle: <span>${content.content_angle || '—'}</span></div>
    <div class="meta-item" style="margin-left:auto">${new Date().toLocaleTimeString('th-TH')}</div>
  `;

  const grid = document.getElementById("results-grid");
  grid.innerHTML = "";

  // Card: Related searches
  const relatedHTML = (research.relatedSearches || [])
    .map(s => `<span class="kw-tag">${s}</span>`).join("") +
    (research.suggestions || [])
    .map(s => `<span class="kw-tag">${s}</span>`).join("");

  grid.innerHTML += card("green", "🔍 Related Searches + Autocomplete", `<div class="kw-cloud">${relatedHTML}</div>`);

  // Card: People Also Ask
  const paaHTML = `<ul class="paa-list">${
    (research.peopleAlsoAsk || []).map(q => `<li>${q}</li>`).join("")
  }</ul>`;
  grid.innerHTML += card("purple", "💬 People Also Ask", paaHTML);

  // Card: TikTok Script (Gen Z x3 + Gen Y x3)
  const genZClips = (content.tiktok_scripts?.gen_z || []).slice(0, 3);
  const genYClips = (content.tiktok_scripts?.gen_y || []).slice(0, 3);

  let tiktokHTML = `
    <div class="gen-selector">
      <label>📊 View as:</label>
      <select id="gen-view" onchange="switchGenView()">
        <option value="gen_z">Gen Z (18–27)</option>
        <option value="gen_y">Gen Y (28–42)</option>
        <option value="both">Both</option>
      </select>
    </div>
  `;

  // Gen Z clips
  if (genZClips.length > 0) {
    tiktokHTML += `<div id="gen-z-section"><div style="margin-bottom:12px;"><span style="color:var(--accent2);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:1px;">─── Gen Z (18–27) ───</span></div><div class="clips-container" id="z-clips">`;
    genZClips.forEach((clip, i) => {
      tiktokHTML += renderClip(clip, i + 1, "gen_z");
    });
    tiktokHTML += `</div></div>`;
  }

  // Gen Y clips
  if (genYClips.length > 0) {
    tiktokHTML += `<div id="gen-y-section" style="margin-top:20px;"><div style="margin-bottom:12px;"><span style="color:var(--accent3);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:1px;">─── Gen Y (28–42) ───</span></div><div class="clips-container" id="y-clips">`;
    genYClips.forEach((clip, i) => {
      tiktokHTML += renderClip(clip, i + 1, "gen_y");
    });
    tiktokHTML += `</div></div>`;
  }

  grid.innerHTML += card("orange full", "🎵 TikTok Scripts", tiktokHTML);

  // Card: Pain Points
  const painHTML = `<ul class="pain-list">${
    (content.pain_points || []).map(p => `<li>${p}</li>`).join("")
  }</ul>`;
  grid.innerHTML += card("orange", "⚡ Pain Points", painHTML);

  // Card: Top SERP
  const serpHTML = (research.topResults || []).map(r => `
    <div class="serp-item">
      <div class="serp-title">${r.title}</div>
      <div class="serp-snippet">${r.snippet || ''}</div>
      <div class="serp-url">${r.url}</div>
    </div>
  `).join("");
  grid.innerHTML += card("green", "📈 Top Google Results", serpHTML);

  // Card: SEO FAQ
  const faqHTML = (content.seo_faq || []).map(item => `
    <div class="faq-item">
      <div class="faq-q">${item.question}</div>
      <div class="faq-a">${item.answer}</div>
    </div>
  `).join("");
  grid.innerHTML += card("purple full", "🤖 SEO FAQ (AI Search)", faqHTML);

  document.getElementById("results").classList.add("show");
  document.getElementById("empty-state").style.display = "none";
}

function renderClip(clip, num, gen) {
  const isGenZ = gen === "gen_z";
  return `
    <div class="clip ${gen}">
      <div class="clip-header">📹 Clip ${num}: ${clip.type || 'Content'}</div>
      
      <div class="clip-part">
        <div class="clip-label">🎬 Hook (3 วินาที)</div>
        <div class="clip-content">${clip.hook || '—'}</div>
      </div>

      <div class="clip-part">
        <div class="clip-label">📢 Script (30–60 วินาที)</div>
        <div class="clip-content">${(clip.script || '—').replace(/\n/g, '<br>')}</div>
      </div>

      <div class="clip-part">
        <div class="clip-label">🎯 TikTok SEO Keywords</div>
        <div class="keyword-tags">${
          (clip.seo_keywords || []).map(k => `<span class="tag ${gen}">${k}</span>`).join('')
        }</div>
      </div>

      <div class="clip-part">
        <div class="clip-label">🤖 AI Search Sentence</div>
        <div class="clip-content">${clip.ai_sentence || '—'}</div>
      </div>

      <div class="clip-part">
        <div class="clip-label">📎 Caption</div>
        <div class="clip-content">${clip.caption || '—'}</div>
      </div>

      <div class="clip-part">
        <div class="clip-label">💬 Hashtags</div>
        <div class="hashtags">${(clip.hashtags || []).map(h => `<span class="hashtag">${h}</span>`).join(' ')}</div>
      </div>
    </div>
  `;
}

function card(cls, title, body) {
  const [color, extra] = cls.split(" ");
  return `
    <div class="card ${color} ${extra || ''}">
      <div class="card-title">${title}</div>
      ${body}
    </div>
  `;
}

function switchGenView() {
  const view = document.getElementById("gen-view")?.value || "gen_z";
  const zSec = document.getElementById("gen-z-section");
  const ySec = document.getElementById("gen-y-section");
  if (zSec) zSec.style.display = view === "gen_z" || view === "both" ? "block" : "none";
  if (ySec) ySec.style.display = view === "gen_y" || view === "both" ? "block" : "none";
}

async function saveToSheet() {
  if (!currentData || !appsScriptUrl) return;
  const url = `${appsScriptUrl}?action=save&keyword=${encodeURIComponent(currentData.keyword)}`;
  document.getElementById("status-label").textContent = "saving...";
  try {
    await fetch(url);
    document.getElementById("status-label").textContent = "saved ✓";
    setTimeout(() => document.getElementById("status-label").textContent = "ready", 2000);
  } catch {
    document.getElementById("status-label").textContent = "save failed";
  }
}

function copyAllScripts() {
  if (!currentData?.content?.tiktok_scripts) return;
  const genZ = currentData.content.tiktok_scripts.gen_z || [];
  const genY = currentData.content.tiktok_scripts.gen_y || [];
  let text = "=== GEN Z SCRIPTS ===\n\n";
  genZ.slice(0, 3).forEach((c, i) => {
    text += `📹 Clip ${i+1}: ${c.type}\nHook: ${c.hook}\nScript: ${c.script}\nCaption: ${c.caption}\nHashtags: ${(c.hashtags||[]).join(' ')}\n\n`;
  });
  text += "=== GEN Y SCRIPTS ===\n\n";
  genY.slice(0, 3).forEach((c, i) => {
    text += `📹 Clip ${i+1}: ${c.type}\nHook: ${c.hook}\nScript: ${c.script}\nCaption: ${c.caption}\nHashtags: ${(c.hashtags||[]).join(' ')}\n\n`;
  });
  navigator.clipboard.writeText(text).then(() => alert("คัดลอก TikTok Scripts แล้ว!"));
}

function copyFAQ() {
  if (!currentData?.content?.seo_faq) return;
  const text = currentData.content.seo_faq
    .map(a => `Q: ${a.question}\nA: ${a.answer}`)
    .join("\n\n");
  navigator.clipboard.writeText(text).then(() => alert("คัดลอก SEO FAQ แล้ว!"));
}

function setLoading(v) {
  document.getElementById("loading").className = v ? "loading show" : "loading";
  document.getElementById("btn-run").disabled = v;
  document.getElementById("status-label").textContent = v ? "running..." : "ready";
}

function hideError() {
  document.getElementById("error-box").className = "error-box";
}

function showError(msg) {
  const el = document.getElementById("error-box");
  el.textContent = msg;
  el.className = "error-box show";
}

function resetResults() {
  currentData = null;
  document.getElementById("results").classList.remove("show");
  document.getElementById("results-grid").innerHTML = "";
  document.getElementById("empty-state").style.display = "block";
}
</script>
</body>
</html>
